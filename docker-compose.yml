services:
  db:
    image: postgres:17-alpine
    container_name: db
    restart: always
    env_file:
      - .env.db.dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: devlab-audit
    container_name: audit-app
    depends_on:
      db:
        condition: service_healthy
    build:
      context: .
      dockerfile: dockerfile
    env_file:
      - .env.db.dev
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/audit-trail
      DATABASE_USERNAME: user
      DATABASE_PASSWORD: 12345
    ports:
      - "8080:8080"
    restart: always

volumes:
  postgres_data:
