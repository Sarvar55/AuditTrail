spring:
  application:
    name: audit-trail
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/audit-trail}
    username: ${DATABASE_USERNAME:user}
    password: ${DATABASE_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver

  mvc:
    apiversion:
      use:
        header: ${API_VERSION_HEADER:X-API-Version}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:false}

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  pattern:
    console: "%green(%d{yyyy-MM-dd HH:mm:ss.SSS}) %red([%thread]) %highlight(%-5level) %yellow(%-40.40logger{39}:%L) - %msg%n"

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
    allowed-methods: ${CORS_ALLOWED_METHODS:"*"}
    allowed-headers: ${CORS_ALLOWED_HEADERS:"*"}
    max-age: ${CORS_MAX_AGE:3600}
  jwt:
    secret: ${JWT_SECRET:dGFzay1ib2FyZC1kZXZlbG9wbWVudC1zZWNyZXQta2V5LWNoYW5nZS1tZS1wbGVhc2UtMzI=}
    expiration: ${JWT_EXPIRATION:3600000}
  admin:
    name: ${ADMIN_NAME:admin}
    email: ${ADMIN_EMAIL:admin@gmail.com}
    password: ${ADMIN_PASSWORD:admin@@1234!!}

  seed:
    enabled: ${AUDIT_TRAIL_SEED_ENABLED:true}
    user-email: ${USER_EMAIL:demo@example.com}
    password: ${DEMO_PASSWORD:password}


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${PORT:8080}
